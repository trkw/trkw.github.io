<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --bg: #fafafa;
      --accent: #2563eb;
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.75rem 0;
      border-bottom: 1px solid #e5e7eb;
      gap: 1rem;
    }

    li:last-child {
      border-bottom: none;
    }

    a {
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      color: var(--accent);
    }

    .date {
      color: var(--muted);
      font-size: 0.875rem;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Blog</h1>
    <ul>
      <li><a href="/posts/2026-03-02-blog-app.html">ブログの投稿しやすいようにする</a> <span class="date">2026年3月2日</span></li>
<li><a href="/posts/2026-02-28-blog.html">ブログ始める</a> <span class="date">2026年2月28日</span></li>
<li><a href="/posts/zig-tips.html">Zig Tips & Tricks</a> <span class="date">2026年2月27日</span></li>
<li><a href="/posts/hello-world.html">Hello, World!</a> <span class="date">2026年2月26日</span></li>

    </ul>
  </div>
</body>

</html>
